<div class="editor-container">
  <!-- Fila 1: Toolbar superior -->
  <header class="editor-toolbar">
    <app-toolbar
      [canUndo]="canUndo()"
      [canRedo]="canRedo()"
      [fieldCount]="fieldCount()"
      [zoomPercent]="zoomPercent"
      [hasUnsavedChanges]="hasUnsavedChanges()"
      [saveStatus]="saveStatus()"
      [showAdvancedJson]="showAdvancedJson()"
      (advancedJsonToggleClicked)="onToggleAdvancedJson()"
      (undoClicked)="onUndo()"
      (redoClicked)="onRedo()"
      (zoomInClicked)="onZoomIn()"
      (zoomOutClicked)="onZoomOut()"
      (previewClicked)="onPreview()"
      (exportClicked)="onExport()"
      (saveClicked)="onSave()"
      (deleteFieldClicked)="onDeleteField()"
      (discardDraftClicked)="onDiscardDraft()"
      (templateLoaded)="onTemplateLoaded($event)"
      (addTextClicked)="onAddText($event)"
      (addTableClicked)="onAddTable($event)"
      (addElementClicked)="onAddElement($event)"
      (alignClicked)="onAlign($event)"
      (gridToggleClicked)="onGridToggle()"
      (snapToggleClicked)="onSnapToggle()"
    />
  </header>

  <!-- Fila 2, Columna 1: Sidebar izquierdo -->
  <aside class="editor-sidebar">
    <app-sidebar-fields />
  </aside>

  <!-- Fila 2, Columna 2: Canvas central -->
  <main class="editor-canvas">
    @if (showAdvancedJson()) {
      <div class="advanced-json-viewport">
        <div
          class="advanced-json-page"
          [style.width.px]="advancedPageWidthPx()"
          [style.height.px]="advancedPageHeightPx()"
          (click)="onAdvancedPageClicked()"
        >
          @for (section of advancedSections(); track section.id) {
            <app-section-renderer [section]="section" [zoom]="zoom()" />
          }
        </div>
      </div>
    } @else {
      <app-canvas
        [placedFields]="placedFields()"
        [selectedFieldId]="selectedFieldId()"
        [zoom]="zoom()"
        [showGrid]="showGrid()"
        [snapEnabled]="snapEnabled()"
        (fieldDropped)="onFieldDropped($event)"
        (fieldSelected)="onFieldSelected($event)"
        (fieldMoved)="onFieldMoved($event)"
        (pageClicked)="onPageClicked()"
        (detailTableSelected)="onDetailTableSelected()"
      />
    }
  </main>

  <!-- Fila 2, Columna 3: Panel de propiedades -->
  <aside class="editor-properties">
    <app-properties-panel
      [field]="selectedField()"
      [isDetailTableSelected]="isDetailTableSelected()"
      (fieldUpdated)="onFieldUpdated($event)"
      (fieldDeleted)="onFieldDeleted($event)"
      (uploadImage)="onUploadImageFromProps()"
    />
  </aside>
</div>

<!-- Modal de Preview -->
@if (showPreview()) {
  <app-preview-modal
    [fields]="placedFields()"
    [templateName]="'Factura Electrónica v1.0'"
    (closed)="onClosePreview()"
  />
}

<!-- Hidden file input for image upload -->
<input
  #imageFileInput
  type="file"
  accept="image/*"
  style="display: none"
  (change)="onImageFileSelected($event)"
/>
