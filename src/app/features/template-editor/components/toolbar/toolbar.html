<div class="toolbar-wrapper">
  <!-- NIVEL 1: Document + Actions -->
  <div class="toolbar-level-1">
    <!-- Logo + App Title -->
    <div class="toolbar-section toolbar-brand">
      <img src="images/logo.svg" alt="Logo" class="brand-logo" />
      <span class="brand-title">PDF Template Editor</span>
    </div>

    <span class="toolbar-separator"></span>

    <div class="toolbar-section toolbar-doc-name">
      <lucide-angular name="FileText" [size]="14" class="doc-icon"></lucide-angular>
      <span class="doc-name">{{ documentName() }}</span>
    </div>

    <span class="toolbar-separator"></span>

    <!-- Plantilla -->
    <div class="toolbar-section toolbar-template-type">
      <select class="template-selector" (change)="onTemplateChange($event)">
        <option value="">Plantilla...</option>
        @for (tpl of templates; track tpl.id) {
          <option [value]="tpl.id">{{ tpl.name }}</option>
        }
      </select>
      <span class="template-counter">{{ fieldCount() }}</span>
    </div>

    <span class="toolbar-spacer"></span>

    <!-- Acciones -->
    <div class="toolbar-section toolbar-actions">
      <button class="btn-icon-sm" [disabled]="!canUndo()" (click)="undoClicked.emit()" data-tooltip="Deshacer (Ctrl+Z)">
        <lucide-angular name="Undo2" [size]="14"></lucide-angular>
      </button>
      <button class="btn-icon-sm" [disabled]="!canRedo()" (click)="redoClicked.emit()" data-tooltip="Rehacer (Ctrl+Y)">
        <lucide-angular name="Redo2" [size]="14"></lucide-angular>
      </button>

      <span class="toolbar-separator"></span>

      <button class="btn-icon-sm" (click)="previewClicked.emit()" data-tooltip="Vista previa del JSON">
        <lucide-angular name="Eye" [size]="14"></lucide-angular>
      </button>
      <button class="btn-icon-sm" (click)="exportClicked.emit()" data-tooltip="Exportar JSON del template">
        <lucide-angular name="Download" [size]="14"></lucide-angular>
      </button>
      <button class="btn-icon-sm" (click)="deleteFieldClicked.emit()" data-tooltip="Eliminar campo seleccionado">
        <lucide-angular name="Trash2" [size]="14"></lucide-angular>
      </button>

      @if (hasUnsavedChanges()) {
        <button class="btn-icon-sm" (click)="discardDraftClicked.emit()" data-tooltip="Descartar cambios sin guardar">
          <lucide-angular name="RotateCcw" [size]="14"></lucide-angular>
        </button>
      }

      <span class="toolbar-separator"></span>

      <button
        class="btn-action btn-primary"
        [class.btn-saving]="saveStatus() === 'saving'"
        [class.btn-saved]="saveStatus() === 'saved'"
        [class.btn-error]="saveStatus() === 'error'"
        [disabled]="saveStatus() === 'saving'"
        (click)="saveClicked.emit()"
        data-tooltip="Guardar template en servidor"
      >
        @if (saveStatus() === 'saving') {
          <lucide-angular name="Loader2" [size]="14" class="spin-icon"></lucide-angular>
          <span class="btn-label">Guardando...</span>
        } @else if (saveStatus() === 'saved') {
          <lucide-angular name="CheckCircle" [size]="14"></lucide-angular>
          <span class="btn-label">Guardado</span>
        } @else if (saveStatus() === 'error') {
          <lucide-angular name="AlertCircle" [size]="14"></lucide-angular>
          <span class="btn-label">Error</span>
        } @else {
          <lucide-angular name="Save" [size]="14"></lucide-angular>
          <span class="btn-label">Guardar</span>
        }
      </button>
    </div>
  </div>

  <!-- NIVEL 2: Design tools -->
  <div class="toolbar-level-2">
    <!-- Tipografía -->
    <div class="toolbar-section toolbar-typography">
      <select class="font-selector">
        <option>Roboto</option>
        <option>Inter</option>
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Courier New</option>
      </select>
      <div class="font-size-control">
        <button class="btn-icon-sm" data-tooltip="Reducir tamaño de fuente">
          <lucide-angular name="Minus" [size]="12"></lucide-angular>
        </button>
        <span class="font-size-value">10</span>
        <button class="btn-icon-sm" data-tooltip="Aumentar tamaño de fuente">
          <span>+</span>
        </button>
      </div>
      <button class="btn-format" data-tooltip="Negrita"><strong>B</strong></button>
      <button class="btn-format italic-btn" data-tooltip="Cursiva"><em>I</em></button>
      <button class="btn-format underline-btn" data-tooltip="Subrayado"><span class="underline-text">U</span></button>
    </div>

    <span class="toolbar-divider"></span>

    <!-- Agregar: Texto + Campos + Tablas + Elementos -->
    <div class="toolbar-section toolbar-add">
      <span class="tool-group-label">Agregar</span>
      <button class="btn-tool-icon" (click)="addTextClicked.emit('text')" data-tooltip="Agregar texto libre en el canvas">
        <lucide-angular name="Type" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="addTextClicked.emit('heading')" data-tooltip="Agregar encabezado de sección">
        <lucide-angular name="Heading" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="addTextClicked.emit('field')" data-tooltip="Campo de datos vinculado al XML">
        <lucide-angular name="Variable" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="addTextClicked.emit('number')" data-tooltip="Campo numérico con decimales">
        <lucide-angular name="Hash" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="addTextClicked.emit('date')" data-tooltip="Campo de fecha DD/MM/AAAA">
        <lucide-angular name="Calendar" [size]="14"></lucide-angular>
      </button>
      <span class="tool-sep-v"></span>
      <button class="btn-tool-icon" (click)="addTableClicked.emit({ cols: 3, rows: 3 })" data-tooltip="Tabla editable de 3 columnas">
        <lucide-angular name="Table" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="addElementClicked.emit('line')" data-tooltip="Línea horizontal o vertical">
        <lucide-angular name="Minus" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="addElementClicked.emit('rectangle')" data-tooltip="Rectángulo o caja decorativa">
        <lucide-angular name="Square" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="addElementClicked.emit('image')" data-tooltip="Subir imagen o ingresar URL">
        <lucide-angular name="Image" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="addElementClicked.emit('qr')" data-tooltip="Código QR dinámico del XML">
        <lucide-angular name="QrCode" [size]="14"></lucide-angular>
      </button>
    </div>

    <span class="toolbar-divider"></span>

    <!-- Alineación -->
    <div class="toolbar-section toolbar-align">
      <span class="tool-group-label">Alinear</span>
      <button class="btn-tool-icon" (click)="alignClicked.emit('left')" data-tooltip="Alinear a la izquierda">
        <lucide-angular name="AlignLeft" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="alignClicked.emit('center-horizontal')" data-tooltip="Centrar horizontal">
        <lucide-angular name="AlignCenterHorizontal" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="alignClicked.emit('right')" data-tooltip="Alinear a la derecha">
        <lucide-angular name="AlignRight" [size]="14"></lucide-angular>
      </button>
      <span class="tool-sep-v"></span>
      <button class="btn-tool-icon" (click)="alignClicked.emit('top')" data-tooltip="Alinear arriba">
        <lucide-angular name="AlignVerticalJustifyStart" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="alignClicked.emit('center-vertical')" data-tooltip="Centrar vertical">
        <lucide-angular name="AlignVerticalJustifyCenter" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="alignClicked.emit('bottom')" data-tooltip="Alinear abajo">
        <lucide-angular name="AlignVerticalJustifyEnd" [size]="14"></lucide-angular>
      </button>
    </div>

    <span class="toolbar-spacer"></span>

    <!-- Grid + Snap + Zoom -->
    <div class="toolbar-section toolbar-view">
      <span class="tool-group-label">Vista</span>
      <button class="btn-tool-icon" (click)="gridToggleClicked.emit()" data-tooltip="Mostrar/ocultar cuadrícula">
        <lucide-angular name="Grid3x3" [size]="14"></lucide-angular>
      </button>
      <button class="btn-tool-icon" (click)="snapToggleClicked.emit()" data-tooltip="Snap a cuadrícula">
        <lucide-angular name="Magnet" [size]="14"></lucide-angular>
      </button>
      <span class="tool-sep-v"></span>
      <button class="btn-icon-sm no-tooltip" (click)="zoomOutClicked.emit()">
        <lucide-angular name="ZoomOut" [size]="14"></lucide-angular>
      </button>
      <span class="zoom-value">{{ zoomPercent() }}%</span>
      <button class="btn-icon-sm no-tooltip" (click)="zoomInClicked.emit()">
        <lucide-angular name="ZoomIn" [size]="14"></lucide-angular>
      </button>
    </div>
  </div>
</div>
