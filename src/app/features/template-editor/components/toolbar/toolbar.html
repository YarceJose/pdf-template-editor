<div class="toolbar-wrapper">
  <!-- NIVEL 1: Documento + Tipografía + Acciones -->
  <div class="toolbar-level-1">
    <div class="toolbar-section toolbar-doc-name">
      <span class="doc-name">{{ documentName() }}</span>
    </div>

    <!-- Tipografía -->
    <div class="toolbar-section toolbar-typography">
      <select class="font-selector">
        <option>Roboto</option>
        <option>Inter</option>
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Courier New</option>
      </select>

      <div class="font-size-control">
        <button class="btn-icon-sm" title="Reducir tamaño">&#8722;</button>
        <span class="font-size-value">10</span>
        <button class="btn-icon-sm" title="Aumentar tamaño">+</button>
      </div>

      <span class="toolbar-separator"></span>

      <button class="btn-format" title="Negrita"><strong>B</strong></button>
      <button class="btn-format italic-btn" title="Cursiva"><em>I</em></button>
      <button class="btn-format underline-btn" title="Subrayado"><span class="underline-text">U</span></button>
    </div>

    <!-- Acciones -->
    <div class="toolbar-section toolbar-actions">
      <button class="btn-action btn-danger" (click)="deleteFieldClicked.emit()" title="Borrar campo seleccionado">
        <span class="btn-icon">&#10005;</span>
        <span class="btn-label">Borrar</span>
      </button>
      <button class="btn-action btn-primary" (click)="exportClicked.emit()" title="Exportar JSON">
        <span class="btn-icon">&#11015;</span>
        <span class="btn-label">Exportar</span>
      </button>
    </div>
  </div>

  <!-- NIVEL 2: Herramientas de diseño -->
  <div class="toolbar-level-2">

    <!-- Plantilla -->
    <div class="toolbar-section toolbar-template-type">
      <span class="template-label">Plantilla:</span>
      <select class="template-selector" (change)="onTemplateChange($event)">
        <option value="">— Seleccionar —</option>
        @for (tpl of templates; track tpl.id) {
          <option [value]="tpl.id">{{ tpl.name }}</option>
        }
      </select>
      <span class="template-counter">{{ fieldCount() }} campos</span>
    </div>

    <span class="toolbar-divider"></span>

    <!-- Herramientas de diseño -->
    <div class="toolbar-section toolbar-design-tools">
      <!-- Texto -->
      <div class="tool-group">
        <span class="tool-group-label">Texto</span>
        <div class="tool-buttons">
          <button class="btn-tool" (click)="addTextClicked.emit('text')" title="Agregar texto plano">
            <span class="tool-icon">T</span>
            <span class="tool-name">Texto</span>
          </button>
          <button class="btn-tool" (click)="addTextClicked.emit('heading')" title="Agregar encabezado">
            <span class="tool-icon">H1</span>
            <span class="tool-name">Título</span>
          </button>
          <button class="btn-tool" (click)="addTextClicked.emit('label')" title="Agregar etiqueta/label">
            <span class="tool-icon">Lb</span>
            <span class="tool-name">Label</span>
          </button>
        </div>
      </div>

      <span class="toolbar-divider"></span>

      <!-- Campos de datos -->
      <div class="tool-group">
        <span class="tool-group-label">Datos</span>
        <div class="tool-buttons">
          <button class="btn-tool" (click)="addTextClicked.emit('field')" title="Campo de datos dinámico">
            <span class="tool-icon">[x]</span>
            <span class="tool-name">Campo</span>
          </button>
          <button class="btn-tool" (click)="addTextClicked.emit('number')" title="Campo numérico">
            <span class="tool-icon">#</span>
            <span class="tool-name">Número</span>
          </button>
          <button class="btn-tool" (click)="addTextClicked.emit('date')" title="Campo de fecha">
            <span class="tool-icon">📅</span>
            <span class="tool-name">Fecha</span>
          </button>
        </div>
      </div>

      <span class="toolbar-divider"></span>

      <!-- Tablas y grillas -->
      <div class="tool-group">
        <span class="tool-group-label">Tablas</span>
        <div class="tool-buttons">
          <button class="btn-tool" (click)="addTableClicked.emit({ cols: 3, rows: 3 })" title="Tabla 3×3">
            <span class="tool-icon">⊞</span>
            <span class="tool-name">3×3</span>
          </button>
          <button class="btn-tool" (click)="addTableClicked.emit({ cols: 5, rows: 3 })" title="Tabla 5×3">
            <span class="tool-icon">⊞</span>
            <span class="tool-name">5×3</span>
          </button>
          <button class="btn-tool" (click)="addTableClicked.emit({ cols: 4, rows: 5 })" title="Tabla 4×5">
            <span class="tool-icon">⊞</span>
            <span class="tool-name">4×5</span>
          </button>
        </div>
      </div>

      <span class="toolbar-divider"></span>

      <!-- Elementos -->
      <div class="tool-group">
        <span class="tool-group-label">Elementos</span>
        <div class="tool-buttons">
          <button class="btn-tool" (click)="addElementClicked.emit('line')" title="Línea horizontal">
            <span class="tool-icon">—</span>
            <span class="tool-name">Línea</span>
          </button>
          <button class="btn-tool" (click)="addElementClicked.emit('rectangle')" title="Rectángulo">
            <span class="tool-icon">▭</span>
            <span class="tool-name">Caja</span>
          </button>
          <button class="btn-tool" (click)="addElementClicked.emit('image')" title="Imagen/Logo">
            <span class="tool-icon">🖼</span>
            <span class="tool-name">Imagen</span>
          </button>
          <button class="btn-tool" (click)="addElementClicked.emit('qr')" title="Código QR">
            <span class="tool-icon">二维码</span>
            <span class="tool-name">QR</span>
          </button>
        </div>
      </div>

      <span class="toolbar-divider"></span>

      <!-- Alineación -->
      <div class="tool-group">
        <span class="tool-group-label">Alinear</span>
        <div class="tool-buttons">
          <button class="btn-tool-icon" (click)="alignClicked.emit('left')" title="Alinear izquierda">&#8676;</button>
          <button class="btn-tool-icon" (click)="alignClicked.emit('center-horizontal')" title="Centrar horizontalmente">&#8596;</button>
          <button class="btn-tool-icon" (click)="alignClicked.emit('right')" title="Alinear derecha">&#8677;</button>
          <span class="tool-sep-v"></span>
          <button class="btn-tool-icon" (click)="alignClicked.emit('top')" title="Alinear arriba">&#8673;</button>
          <button class="btn-tool-icon" (click)="alignClicked.emit('center-vertical')" title="Centrar verticalmente">&#8597;</button>
          <button class="btn-tool-icon" (click)="alignClicked.emit('bottom')" title="Alinear abajo">&#8675;</button>
        </div>
      </div>

      <span class="toolbar-divider"></span>

      <!-- Cuadrícula -->
      <div class="tool-group">
        <button class="btn-tool-icon" (click)="gridToggleClicked.emit()" title="Mostrar/ocultar cuadrícula">
          <span class="tool-icon">#</span>
        </button>
        <button class="btn-tool-icon" (click)="snapToggleClicked.emit()" title="Snap a cuadrícula">
          <span class="tool-icon">🧲</span>
        </button>
      </div>
    </div>

    <span class="toolbar-spacer"></span>

    <!-- Zoom -->
    <div class="toolbar-section toolbar-zoom">
      <button class="btn-icon-sm" (click)="zoomOutClicked.emit()" title="Alejar">&#8722;</button>
      <span class="zoom-value">{{ zoomPercent() }}%</span>
      <button class="btn-icon-sm" (click)="zoomInClicked.emit()" title="Acercar">+</button>
    </div>

    <span class="toolbar-divider"></span>

    <!-- Undo/Redo/Preview -->
    <div class="toolbar-section toolbar-utilities">
      <button class="btn-utility" [disabled]="!canUndo()" (click)="undoClicked.emit()" title="Deshacer (Ctrl+Z)">
        &#8630;
      </button>
      <button class="btn-utility" [disabled]="!canRedo()" (click)="redoClicked.emit()" title="Rehacer (Ctrl+Y)">
        &#8631;
      </button>
      <button class="btn-utility" (click)="previewClicked.emit()" title="Vista previa JSON">
        <span class="btn-icon">&#128065;</span>
        <span class="btn-label">Preview</span>
      </button>
    </div>
  </div>
</div>
