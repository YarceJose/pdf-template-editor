<div
  class="field-canvas-item"
  [class.selected]="selected()"
  [class.locked]="isLocked()"
  [class.system]="isSystem()"
  [class.field-image]="field().type === 'image' && field().imageUrl"
  [class.has-custom-color]="textColor()"
  [class.has-custom-border]="borderColor()"
  [style.transform]="transformStyle()"
  [style.width]="styleWidth()"
  [style.height]="styleHeight()"
  [style.fontSize]="styleFontSize()"
  [style.fontWeight]="field().bold ? 'bold' : 'normal'"
  [style.fontStyle]="field().italic ? 'italic' : 'normal'"
  [style.textDecoration]="field().underline ? 'underline' : 'none'"
  [style.color]="textColor() || null"
  [style.borderColor]="borderColor() || null"
  [style.borderWidth]="borderWidth() ? borderWidth() + 'px' : null"
  [title]="field().fieldKey + ': ' + sampleValue()"
  (click)="onSelect(); $event.stopPropagation()"
  cdkDrag
  [cdkDragDisabled]="!canDrag()"
  (cdkDragEnded)="onDragEnded($event)"
>
  @if (field().type === 'image' && field().imageUrl) {
    <img class="field-image-img" [src]="field().imageUrl" [alt]="field().label" />
  } @else {
    <span class="field-key-label">{{ field().fieldKey }}</span>
    @if (sampleValue()) {
      <span class="field-sample-value">{{ sampleValue() }}</span>
    }
  }
</div>
